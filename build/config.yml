# Wails v3 build configuration
version: '3'

info:
  companyName: "MQTT Viewer"
  productName: "MQTT Viewer"
  productIdentifier: "com.mqttviewer.MQTTViewer"
  description: "A fast and feature-rich MQTT visualization and debugging tool"
  copyright: "Copyright © 2024 MQTT Viewer"
  comments: ""
  version: "0.0.1"

# Dev mode configuration
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
    - .git
    - node_modules
    - frontend
    - build/bin
    file:
    - .DS_Store
    - .gitignore
    - .gitkeep
    watched_extension:
    - "*.go"
    git_ignore: true
  executes:
  - cmd: wails3 task build
    type: blocking
  - cmd: wails3 task common:dev:frontend
    type: background
  - cmd: wails3 task run
    type: primary
